<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>🔐 Password Generator</h1>
        <button id="toggleTheme" onclick="toggleTheme()">☀️ Light Mode</button>

        <input type="text" id="password" placeholder="Your password..." readonly>

        <div class="controls">
            <label>Password Length: <span id="lengthValue">12</span></label>
            <input type="range" id="length" min="8" max="32" value="12">
            <class="options">
                <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
                <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
                <label><input type="checkbox" id="numbers" checked> Numbers</label>
                <label><input type="checkbox" id="symbols" checked> Symbols</label>
                </class>
        </div>

        <button onclick="generatePassword()">Generate</button>
        <button onclick="copyPassword()">Copy</button>

        <p id="strength"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
